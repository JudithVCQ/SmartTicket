name: QA Pipeline DevSecOps

on:
  push:
    branches: [ main, develop, ci/stabilization ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: defaultdb
          POSTGRES_USER: avnadmin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: DevSecOps - Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run API Tests (Jest) with Coverage
        env:
          DATABASE_URL: postgres://avnadmin:password@localhost:5432/defaultdb?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run test:api -- --coverage --forceExit